<svg viewBox="0 0 880 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="git-repo-doctor: read-only diagnosis and safe cleanup for bloated Git repositories">
  <style>
    .term { font: 600 36px ui-monospace, 'SF Mono', Menlo, monospace; fill: #e6edf3; letter-spacing: -1px; }
    .prompt { fill: #6366f1; }
    .tag { font: 400 13px ui-monospace, 'SF Mono', Menlo, monospace; fill: #8b949e; letter-spacing: 1.2px; }
    .microdim { font: 500 11px ui-monospace, 'SF Mono', Menlo, monospace; fill: #586069; letter-spacing: 2.2px; }
    .orbit { fill: none; stroke: #30363d; stroke-width: 1; }
    .orbit-accent { fill: none; stroke: #6366f1; stroke-width: 1.4; stroke-dasharray: 6 7; animation: hero-spin 9s linear infinite; }
    @keyframes hero-spin { to { stroke-dashoffset: -130; } }
    .cursor { fill: #6366f1; animation: hero-blink 1.1s steps(1) infinite; }
    @keyframes hero-blink { 50% { opacity: 0; } }
    .node { fill: #e6edf3; }
    .nodeglow { fill: #6366f1; opacity: .9; }
  </style>

  <rect width="880" height="220" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="879" height="219" fill="none" stroke="#30363d"/>

  <!-- terminal wordmark -->
  <text class="term" x="64" y="104"><tspan class="prompt">$ </tspan>git-repo-doctor</text>
  <rect class="cursor" x="424" y="78" width="15" height="32"/>
  <text class="tag" x="64" y="144">read-only bloat diagnosis + safe, rollback-aware cleanup</text>
  <text class="microdim" x="64" y="182">ZERO DEPENDENCIES · PYTHON 3 · PRINTS THE PLAN, RUNS NOTHING</text>

  <!-- orbital system: garbage settling around the one source of truth -->
  <g transform="translate(700,110)">
    <ellipse class="orbit" rx="132" ry="52" transform="rotate(-14)"/>
    <ellipse class="orbit" rx="96" ry="38" transform="rotate(-14)"/>
    <ellipse class="orbit-accent" rx="64" ry="25" transform="rotate(-14)"/>
    <circle class="nodeglow" r="5"/>
    <circle fill="none" stroke="#6366f1" stroke-opacity=".35" r="10"/>
    <circle class="node" r="3.2">
      <animateMotion dur="8s" repeatCount="indefinite"
        path="M 128.07,-31.93 A 132,52 -14 1 1 -128.07,31.93 A 132,52 -14 1 1 128.07,-31.93"/>
    </circle>
    <circle class="node" r="2.6">
      <animateMotion dur="13s" repeatCount="indefinite"
        path="M -93.13,23.22 A 96,38 -14 1 1 93.13,-23.22 A 96,38 -14 1 1 -93.13,23.22"/>
    </circle>
  </g>
</svg>
